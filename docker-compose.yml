services:
  postgres:
    image: postgres:16
    container_name: kidread-postgres
    environment:
      POSTGRES_DB: kidread
      POSTGRES_USER: kidread
      POSTGRES_PASSWORD: kidread123
    ports:
      - "5432:5432"
    volumes:
      - kidread_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kidread -d kidread"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: kidread-redis
    ports:
      - "6379:6379"
    volumes:
      - kidread_redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kidread-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - kidread_qdrant_data:/qdrant/storage

volumes:
  kidread_pg_data:
  kidread_redis_data:
  kidread_qdrant_data:
